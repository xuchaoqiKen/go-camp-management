server:
  port: 8080

spring:
  application:
    name: go-camp-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.gocamp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: go-camp-jwt-secret-key-2026-weiqi-training-camp-management-system
  expiration: 86400000

camp:
  tuition-per-day: 400.00
  leave-deadline-hours: 12
  meal-cancel-deadline-hours: 2